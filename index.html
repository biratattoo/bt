<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bira Tattoo - Ordem Litúrgica</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050505;
      color: white;
      font-family: 'Times New Roman', Georgia, serif;
      overflow-x: hidden;
      height: 100vh;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .bg-video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
    }

    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .brasao {
      width: min(280px, 70vw);
      margin-bottom: 40px;
      opacity: 0.115;
      filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
    }

    .frase {
      font-size: clamp(18px, 4vw, 28px);
      letter-spacing: 4px;
      margin-bottom: 50px;
      font-style: italic;
      color: #c9a54b;
      text-transform: uppercase;
      font-weight: 300;
    }

    .btn-ordem {
      background: transparent;
      border: 2px solid #c9a54b;
      color: #c9a54b;
      padding: 16px 42px;
      font-size: clamp(16px, 3vw, 20px);
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 0.5s;
      font-family: 'Times New Roman', Georgia, serif;
      text-transform: uppercase;
      background: rgba(0,0,0,0.6);
    }

    .btn-ordem:hover {
      background: #c9a54b;
      color: #050505;
      box-shadow: 0 0 30px rgba(201,165,75,0.3);
    }

    @media (max-width: 600px) {
      .frase {
        letter-spacing: 2px;
      }
      .btn-ordem {
        padding: 12px 24px;
        letter-spacing: 2px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <video autoplay muted loop playsinline class="bg-video">
      <source src="video1.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
    
    <div class="content">
      <img src="brasao.png" alt="Brasão da Ordem" class="brasao">
      <div class="frase">"A Verdadeira Tatuagem Nunca Apaga"</div>
      <button class="btn-ordem" id="ingressarBtn">INGRESSAR NA IRMANDADE</button>
    </div>
  </section>

  <audio id="bgMusic" loop>
    <source src="intro.mp3" type="audio/mp3">
  </audio>

  <script>
    const music = document.getElementById('bgMusic');
    const btn = document.getElementById('ingressarBtn');
    let musicaTocando = false;

    if (music) {
      music.volume = 0.2;
    }

    btn.addEventListener('click', function() {
      // Tenta tocar a música (se o navegador permitir)
      if (music && !musicaTocando) {
        music.play().then(() => {
          musicaTocando = true;
        }).catch(() => {
          // navegador bloqueou, fazer nada
        });
      }
      
      // Redireciona para a página da equipe
      window.location.href = 'equipe.html';
    });
  </script>
</body>
</html>

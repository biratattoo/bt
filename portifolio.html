<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio - Bira Tattoo | O Legado da Tinta</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050505;
      color: #e0e0e0;
      font-family: 'Times New Roman', Georgia, serif;
      min-height: 100vh;
    }

    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('fundo.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: -1;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
      border-bottom: 1px solid #c9a54b;
      padding-bottom: 30px;
    }

    header h1 {
      font-size: clamp(36px, 6vw, 56px);
      color: #c9a54b;
      letter-spacing: 8px;
      margin-bottom: 15px;
    }

    header p {
      font-size: 18px;
      font-style: italic;
      color: #aaa;
    }

    nav {
      margin-top: 25px;
    }

    nav a {
      color: #c9a54b;
      text-decoration: none;
      margin: 0 12px;
      font-size: 14px;
      letter-spacing: 2px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* FILTROS/CATEGORIAS */
    .filtros {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 50px;
    }

    .filtro-btn {
      background: transparent;
      border: 1px solid #c9a54b;
      color: #c9a54b;
      padding: 8px 20px;
      cursor: pointer;
      font-family: 'Times New Roman', Georgia, serif;
      letter-spacing: 2px;
      transition: 0.3s;
    }

    .filtro-btn:hover, .filtro-btn.active {
      background: #c9a54b;
      color: #050505;
    }

    /* GRID DE TRABALHOS */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
    }

    .card {
      background: rgba(15, 15, 15, 0.8);
      border: 1px solid #c9a54b30;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.4s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: #c9a54b;
      box-shadow: 0 20px 35px rgba(0,0,0,0.6);
    }

    .card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      transition: 0.5s;
      display: block;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .info {
      padding: 18px;
      text-align: center;
    }

    .info h3 {
      color: #c9a54b;
      font-size: 20px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .info p {
      font-size: 13px;
      color: #aaa;
      font-style: italic;
    }

    /* MODAL (foto grande) */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.95);
      cursor: pointer;
    }

    .modal-content {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      padding: 20px;
    }

    .modal-content img {
      max-width: 90%;
      max-height: 90%;
      border: 3px solid #c9a54b;
      border-radius: 8px;
      object-fit: contain;
    }

    .close-modal {
      position: absolute;
      top: 25px;
      right: 35px;
      color: #c9a54b;
      font-size: 45px;
      font-weight: bold;
      transition: 0.3s;
    }

    .close-modal:hover {
      color: white;
      cursor: pointer;
    }

    .btn-voltar {
      display: inline-block;
      margin-top: 60px;
      background: transparent;
      border: 2px solid #c9a54b;
      color: #c9a54b;
      padding: 12px 32px;
      text-decoration: none;
      letter-spacing: 4px;
      transition: 0.3s;
      text-align: center;
    }

    .btn-voltar:hover {
      background: #c9a54b;
      color: #050505;
    }

    .footer-note {
      text-align: center;
      margin-top: 50px;
      font-size: 12px;
      color: #555;
    }

    @media (max-width: 768px) {
      .container {
        padding: 40px 15px;
      }
      nav a {
        display: inline-block;
        margin: 5px 8px;
      }
      .grid {
        grid-template-columns: 1fr;
      }
      .filtro-btn {
        padding: 5px 14px;
        font-size: 12px;
      }
    }
  </style>
</head>

<!-- Modal para foto grande -->
<div id="modal" class="modal">
  <span class="close-modal">&times;</span>
  <div class="modal-content">
    <img id="modal-img" src="" alt="Ampliada">
  </div>
</div>

<script>
  // FILTROS
  const botoes = document.querySelectorAll('.filtro-btn');
  const cards = document.querySelectorAll('.card');

  botoes.forEach(btn => {
    btn.addEventListener('click', () => {
      // remove active de todos
      botoes.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      const filtro = btn.getAttribute('data-filtro');
      
      cards.forEach(card => {
        if (filtro === 'todos' || card.getAttribute('data-categoria') === filtro) {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
      });
    });
  });

  // MODAL (abrir foto)
  const modal = document.getElementById('modal');
  const modalImg = document.getElementById('modal-img');
  const closeModal = document.querySelector('.close-modal');

  cards.forEach(card => {
    card.addEventListener('click', (e) => {
      const img = card.querySelector('img');
      if (img) {
        modal.style.display = 'block';
        modalImg.src = img.src;
      }
    });
  });

  closeModal.addEventListener('click', () => {
    modal.style.display = 'none';
  });

  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.style.display = 'none';
    }
  });
</script>
